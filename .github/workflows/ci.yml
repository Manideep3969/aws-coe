name: AWS CoE CI/CD

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

env:
  TF_VERSION: '1.9.2'
  TFLINT_VERSION: 'v0.52.0'
  TFSEC_VERSION: 'v1.28.4'
  PYTHON_VERSION: '3.12'

jobs:
  terraform-fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Check Terraform formatting
        run: terraform fmt -recursive -check -diff .

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - control-tower
          - scp
          - iam
          - security
          - security/guardduty
          - security/security-hub
          - security/waf
          - security/inspector
          - networking
          - networking/vpc-flow-logs
          - networking/network-firewall
          - networking/segmentation
          - data-protection
          - data-protection/kms
          - data-protection/s3-access-logs
          - data-protection/data-classification
          - incident-response
          - incident-response/automation
          - backup
          - backup/policies
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Init and Validate
        working-directory: ${{ matrix.module }}
        run: |
          terraform init -backend=false
          terraform validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}
      - name: Init TFLint plugins
        run: tflint --init
      - name: Run TFLint
        run: tflint --recursive

  tfsec:
    name: TFSec Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: false
          config_file: .tfsec.yml

  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          quiet: true
          skip_check: CKV_AWS_18,CKV_AWS_19
          output_format: cli

  python-lint:
    name: Python Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install flake8 black bandit boto3 moto pytest pytest-cov
      - name: Flake8
        run: flake8 --max-line-length=120 --ignore=E203,W503 incident-response/automation/src/
      - name: Black check
        run: black --check --line-length=120 incident-response/automation/src/
      - name: Bandit security scan
        run: bandit -c -ll -r incident-response/automation/src/

  python-test:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install boto3 moto pytest pytest-cov
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=incident-response/automation/src --cov-report=term-missing --cov-fail-under=80

  scp-policy-validation:
    name: SCP Policy Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate SCP JSON policies
        run: |
          errors=0
          for file in scp/policies/*.json; do
            echo "Validating $file..."
            if ! python3 -c "import json; json.load(open('$file'))"; then
              echo "ERROR: Invalid JSON in $file"
              errors=$((errors + 1))
            else
              echo "  Valid JSON"
              policy=$(cat "$file")
              version=$(echo "$policy" | python3 -c "import json,sys; print(json.load(sys.stdin).get('Version',''))")
              if [ "$version" != "2012-10-17" ]; then
                echo "  ERROR: Version must be '2012-10-17', got '$version'"
                errors=$((errors + 1))
              else
                echo "  Valid Version: $version"
              fi
              statements=$(echo "$policy" | python3 -c "import json,sys; print(len(json.load(sys.stdin).get('Statement',[])))")
              echo "  Statements count: $statements"
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "FAILED: $errors policy errors found"
            exit 1
          fi
          echo "All SCP policies validated successfully"

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [terraform-fmt, terraform-validate]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: terraform plan -var-file=terraform.tfvars -out=terraform.plan
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform.plan
          retention-days: 5